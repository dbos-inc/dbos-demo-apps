name: CI for JVM DBOS Starters

on:
  push:
    branches: [ "main" ]
    paths:
      - 'java/**'
      - 'kotlin/**'
      - 'scala/**'
      - 'clojure/**'
      - '.github/workflows/jvm-dbos-starters.yml'
  pull_request:
    types:
      - ready_for_review
      - opened
      - reopened
      - synchronize
    paths:
      - 'java/**'
      - 'kotlin/**'
      - 'scala/**'
      - 'clojure/**'
      - '.github/workflows/jvm-dbos-starters.yml'
  workflow_dispatch:

jobs:
  gradle:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Java DBOS Starter
            working-directory: java/dbos-starter
            java-version: '17'
          - name: Java DBOS Toolbox
            working-directory: java/dbos-toolbox
            java-version: '21'
          - name: Java Widget Store
            working-directory: java/widget-store
            java-version: '17'
          - name: Kotlin DBOS Starter
            working-directory: kotlin/dbos-starter
            java-version: '21'

    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Run tests
        working-directory: ${{ matrix.working-directory }}
        run: ./gradlew test

  scala:
    runs-on: ubuntu-latest
    name: Scala DBOS Starter

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        working-directory: scala/dbos-starter/
        run: sbt test

  clojure:
    runs-on: ubuntu-latest
    name: Clojure DBOS Starter

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest

      - name: Run tests
        working-directory: clojure/dbos-starter/
        run: clojure -X:test
