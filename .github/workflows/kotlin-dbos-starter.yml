name: CI for Kotlin DBOS Starter

on:
  push:
    branches: [ "main" ]
    paths:
      - 'kotlin/dbos-starter/**'
      - '.github/workflows/kotlin-dbos-starter.yml'
  pull_request:
    types:
      - ready_for_review
      - opened
      - reopened
      - synchronize
    paths:
      - 'kotlin/dbos-starter/**'
      - '.github/workflows/kotlin-dbos-starter.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        working-directory: kotlin/dbos-starter/
        run: ./gradlew test
