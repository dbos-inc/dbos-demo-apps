name: CI for Go DBOS Toolbox

on:
  push:
    branches: [ "main" ]
    paths:
      - 'golang/dbos-toolbox/**'
      - '.github/workflows/go-dbos-toolbox.yml'
  pull_request:
    types:
      - ready_for_review
      - opened
      - reopened
      - synchronize
    paths:
      - 'golang/dbos-toolbox/**'
      - '.github/workflows/go-dbos-toolbox.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run tests
        working-directory: golang/dbos-toolbox/
        run: |
          go mod download
          go test -v -timeout 5m ./...
        env:
          DBOS_SYSTEM_DATABASE_URL: sqlite:dbos_toolbox_test.db
