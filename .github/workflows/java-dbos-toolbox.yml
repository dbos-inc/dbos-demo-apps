name: CI for Java DBOS Toolbox

on:
  push:
    branches: [ "main" ]
    paths:
      - 'java/dbos-toolbox/**'
      - '.github/workflows/java-dbos-toolbox.yml'
  pull_request:
    types:
      - ready_for_review
      - opened
      - reopened
      - synchronize
    paths:
      - 'java/dbos-toolbox/**'
      - '.github/workflows/java-dbos-toolbox.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests
        working-directory: java/dbos-toolbox/
        run: ./gradlew test
