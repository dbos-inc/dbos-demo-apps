name: CI for Go Widget Store

on:
  push:
    branches: [ "main" ]
    paths:
      - 'golang/widget-store/**'
      - '.github/workflows/go-widget-store.yml'
  pull_request:
    types:
      - ready_for_review
      - opened
      - reopened
      - synchronize
    paths:
      - 'golang/widget-store/**'
      - '.github/workflows/go-widget-store.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dbos
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Create test database
        run: |
          PGPASSWORD=dbos psql -h localhost -U postgres -c "CREATE DATABASE widget_store_test;"
        env:
          PGPASSWORD: dbos

      - name: Run tests
        working-directory: golang/widget-store/
        run: |
          go mod download
          go test -v -timeout 5m ./...
        env:
          PGPASSWORD: dbos