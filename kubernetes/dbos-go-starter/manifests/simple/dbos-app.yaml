apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbos-go-app
  namespace: dbos-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbos-go-app
  template:
    metadata:
      labels:
        app: dbos-go-app
    spec:
      containers:
        - name: dbos-go-app
          image: 500883621673.dkr.ecr.us-east-1.amazonaws.com/dbos-golang-k8s-integration-app:latest
          imagePullPolicy: Always
          env:
            - name: DBOS_SYSTEM_DATABASE_URL
              value: postgres://postgres:dbos@postgres:5432/dbos_go
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dbos-go-app
  namespace: dbos-demo
spec:
  selector:
    app: dbos-go-app
  ports:
    - port: 8080
      targetPort: 8080
